{% extends "base.html" %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST" action="/update/{{ student[0] }}">

    <input type="text" name="full_name" value="{{ student[1] }}" required><br><br>
    <input type="text" name="reg_no" value="{{ student[2] }}" required><br><br>
    <input type="text" name="course" value="{{ student[3] }}" required><br><br>
    <input type="text" name="gender" value="{{ student[4] }}" required><br><br>

    <button type="submit">Update</button>

</form>

{% endblock %}
