{% extends "base.html" %}

{% block content %}

<h2>Students List</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Reg No</th>
    <th>Course</th>
    <th>Gender</th>
    <th>Actions</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
    <td>
        <a href="/edit/{{ s[0] }}">Edit</a> |
        <a href="/delete/{{ s[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
